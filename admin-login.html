<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mia Darling — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --purple-dark: #25015B;
      --purple-mid: #6A3FBF;
      --purple-light: #A66CFF;
      --purple-soft: #C29AFF;
      --white: #FFFFFF;
      --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08);
      --border-accent: rgba(166,108,255,.4);
      --text-muted: rgba(255,255,255,.4);
      --text-sub: rgba(255,255,255,.65);
      --error: #FF6B6B;
      --success: #6BFFB8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 70% 50% at 15% 110%, rgba(37,1,91,.7) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 85% -5%, rgba(106,63,191,.25) 0%, transparent 60%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(166,108,255,.04) 0%, transparent 70%);
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .4;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Header */
    .logo-section {
      text-align: center;
      padding-bottom: 32px;
    }
    .logo-name {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      color: var(--white);
      line-height: 1;
      margin-bottom: 6px;
    }
    .logo-name span { color: var(--purple-soft); }
    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(166,108,255,.12);
      border: 1px solid rgba(166,108,255,.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--purple-soft);
      margin-top: 10px;
    }
    .logo-badge::before { content: '⬡'; font-size: .9em; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--white);
    }
    .card-sub {
      font-size: .82rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      font-weight: 300;
    }

    /* Form */
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .04em;
      color: var(--text-sub);
    }
    .field input {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--white);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus {
      border-color: var(--border-accent);
      background: rgba(166,108,255,.06);
    }
    .field input.error { border-color: var(--error); }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255,107,107,.08);
      border: 1px solid rgba(255,107,107,.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .8rem;
      color: var(--error);
      margin-bottom: 16px;
    }
    .error-msg.visible { display: flex; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple-mid) 0%, var(--purple-light) 100%);
      border: none;
      border-radius: 12px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }
    .btn-login:hover::after { background: rgba(255,255,255,.06); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .btn-login .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer note */
    .security-note {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .75rem;
      color: var(--text-muted);
      justify-content: center;
      padding-top: 4px;
    }
    .security-note svg { width: 14px; height: 14px; opacity: .6; flex-shrink: 0; }

    /* Supabase CDN script tag placeholder */
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-section">
      <div class="logo-name">Mia <span>Darling</span></div>
    </div>

    <div class="card">
      <div class="card-title">Accès administrateur</div>
      <div class="card-sub">Connectez-vous avec vos identifiants admin pour accéder au tableau de bord.</div>

      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">Email ou mot de passe incorrect.</span>
      </div>

      <div class="field">
        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="admin@miadarling.com" autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Accéder au tableau de bord</span>
        <div class="spinner"></div>
      </button>
    </div>

    <div class="security-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Accès réservé aux administrateurs autorisés
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin-config.js"></script>
  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    // Redirect if already logged in
    window.addEventListener('load', async () => {
      if (!adminSupabase) return;
      const { data: { session } } = await adminSupabase.auth.getSession();
      if (session) {
        // Verify admin role
        const isAdmin = await checkAdminRole(session.user.email);
        if (isAdmin) window.location.href = 'admin-dashboard.html';
      }
    });

    // Enter key support
    [emailInput, passwordInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
      emailInput.classList.add('error');
      passwordInput.classList.add('error');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
      emailInput.classList.remove('error');
      passwordInput.classList.remove('error');
    }

    async function checkAdminRole(email) {
      try {
        const { data, error } = await adminSupabase
          .from('admin_users')
          .select('*')
          .eq('email', email)
          .eq('is_active', true)
          .single();
        return !!data && !error;
      } catch { return false; }
    }

    async function handleLogin() {
      clearError();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      try {
        const { data, error } = await adminSupabase.auth.signInWithPassword({ email, password });

        if (error) {
          showError('Email ou mot de passe incorrect.');
          return;
        }

        // Check admin role in our table
        const isAdmin = await checkAdminRole(data.user.email);
        if (!isAdmin) {
          await adminSupabase.auth.signOut();
          showError('Accès refusé. Vous n\'avez pas les droits administrateur.');
          return;
        }

        // Save admin session info
        localStorage.setItem('mia_admin_email', data.user.email);
        localStorage.setItem('mia_admin_id', data.user.id);

        window.location.href = 'admin-dashboard.html';
      } catch (err) {
        showError('Une erreur est survenue. Réessayez.');
        console.error(err);
      } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
